version: '3.9'
services:
  node-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - SUMMARIZER_URL=http://summarizer:8000
      - TTL_SECONDS=3600
      - MAX_SESSIONS=200
    depends_on:
      - summarizer

  summarizer:
    build: ./summarizer
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4.1
